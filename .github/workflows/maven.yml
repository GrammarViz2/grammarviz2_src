# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java: [ 21, 25 ]
    env:
      OS: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Java ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
        cache: maven
    
    - name: Install jmotif-sax and jmotif-gi from source
      run: |
        git clone --depth 1 https://github.com/jMotif/SAX.git ../SAX
        git clone --depth 1 https://github.com/jMotif/GI.git ../GI
        mvn -B install -P single -DskipTests -f ../SAX/pom.xml
        mvn -B install -DskipTests -f ../GI/pom.xml

    - name: Build with Maven
      run: mvn -B package --file pom.xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        directory: ./target/site/jacoco
        files: jacoco.xml
        env_vars: OS,JAVA
        # don't fail the build if the coverage upload can't authenticate (Codecov
        # requires a token on protected branches); coverage still uploads when CODECOV_TOKEN is set
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: unittests
        name: codecov-umbrella
        verbose: true

  sonarcloud:
    name: Build and analyze
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Install jmotif-sax and jmotif-gi from source
        run: |
          git clone --depth 1 https://github.com/jMotif/SAX.git ../SAX
          git clone --depth 1 https://github.com/jMotif/GI.git ../GI
          mvn -B install -P single -DskipTests -f ../SAX/pom.xml
          mvn -B install -DskipTests -f ../GI/pom.xml
      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=GrammarViz2_grammarviz2_src

  quality:
    name: Static analysis (PMD + SpotBugs)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 21
        cache: maven
    - name: Install jmotif-sax and jmotif-gi from source
      run: |
        git clone --depth 1 https://github.com/jMotif/SAX.git ../SAX
        git clone --depth 1 https://github.com/jMotif/GI.git ../GI
        mvn -B install -P single -DskipTests -f ../SAX/pom.xml
        mvn -B install -DskipTests -f ../GI/pom.xml
    - name: Run quality gate
      run: mvn -B -Pquality verify -Djava.awt.headless=true
